name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan — Mondays 06:17 UTC (off-peak).
    - cron: "17 6 * * 1"

jobs:
  analyze:
    # Job name interpolates matrix.language so the check-run context names
    # rendered by GitHub are "Analyze (rust)" and "Analyze (actions)".
    # Task 8's required-status-checks ruleset depends on these literal names.
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [rust, actions]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        if: matrix.language == 'rust'
        uses: dtolnay/rust-toolchain@stable

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Build (rust)
        if: matrix.language == 'rust'
        run: cargo build --workspace --all-targets

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
